<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquetipos de Supervivencia Financiera</title>
<style>
  :root {
    --bg: #F7F3EC;
    --surface: #ffffff;
    --primary: #1F4E5F;
    --accent: #A35C3D;
    --sage: #8A9A8A;
    --text: #222222;
    --text-light: #555;
    --border: #e0dbd3;
    --user-bubble: #1F4E5F;
    --ai-bubble: #ffffff;
    --shadow: 0 2px 12px rgba(31,78,95,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--primary);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    flex-shrink: 0;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  header h1 {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.2;
  }

  header p {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 2px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    gap: 10px;
    max-width: 780px;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message.ai {
    align-self: flex-start;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.ai .avatar {
    background: var(--primary);
    color: white;
  }

  .message.user .avatar {
    background: var(--accent);
    color: white;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.6;
    max-width: calc(100% - 50px);
    box-shadow: var(--shadow);
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border-top-left-radius: 4px;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border-top-right-radius: 4px;
    color: white;
  }

  .bubble strong { font-weight: 600; }
  .bubble em { font-style: italic; color: var(--sage); }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }

  .bubble ul, .bubble ol {
    padding-left: 20px;
    margin: 8px 0;
  }

  .bubble li { margin-bottom: 4px; }

  .bubble h3 {
    font-size: 15px;
    font-weight: 700;
    margin: 12px 0 6px;
    color: var(--primary);
  }

  .message.user .bubble h3 { color: rgba(255,255,255,0.9); }

  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 6px 4px;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sage);
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  #input-area {
    padding: 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    background: var(--bg);
    color: var(--text);
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #user-input:focus {
    border-color: var(--primary);
  }

  #user-input::placeholder { color: #aaa; }

  #send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--primary);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #174050; }
  #send-btn:active { transform: scale(0.96); }
  #send-btn:disabled { background: #ccc; cursor: not-allowed; }

  #send-btn svg { width: 20px; height: 20px; }

  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .quick-reply {
    background: var(--bg);
    border: 1.5px solid var(--primary);
    color: var(--primary);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .quick-reply:hover {
    background: var(--primary);
    color: white;
  }

  .welcome-card {
    background: linear-gradient(135deg, var(--primary) 0%, #174050 100%);
    color: white;
    border-radius: 16px;
    padding: 24px;
    margin: 8px 0 4px;
    text-align: center;
  }

  .welcome-card h2 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .welcome-card p {
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.5;
    margin-bottom: 0;
  }

  #progress-bar-container {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    flex-shrink: 0;
    display: none;
  }

  #progress-label {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  #progress-track {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  #progress-fill {
    background: var(--primary);
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    #messages { padding: 16px 12px; }
    .bubble { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🧭</div>
  <div>
    <h1>Arquetipos de Supervivencia Financiera</h1>
    <p>Psicología del dinero · Test de arquetipo · Drills personalizados</p>
  </div>
</header>

<div id="progress-bar-container">
  <div id="progress-label">
    <span id="progress-text">Pregunta 1 de 40</span>
    <span id="progress-pct">0%</span>
  </div>
  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>
</div>

<div id="messages"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Escribe tu mensaje..." rows="1"></textarea>
  <button id="send-btn" aria-label="Enviar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

let conversationHistory = [];
let isStreaming = false;

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function parseMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
    .replace(/^## (.*$)/gm, '<h3>$1</h3>')
    .replace(/^# (.*$)/gm, '<h3>$1</h3>')
    .replace(/^[\-\*] (.*$)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, content, withQuickReplies = false) {
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'ai' ? '🧭' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const contentDiv = document.createElement('div');
  contentDiv.innerHTML = '<p>' + parseMarkdown(content) + '</p>';
  bubble.appendChild(contentDiv);

  if (withQuickReplies && role === 'ai') {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';

    const replies = [
      { label: '🎯 Hacer el test', text: 'Quiero hacer el test de arquetipo' },
      { label: '💡 ¿Cómo funciona esto?', text: '¿Cómo funciona el sistema de arquetipos?' },
      { label: '📖 Cuéntame más', text: 'Cuéntame sobre la psicología del dinero' }
    ];

    replies.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'quick-reply';
      btn.textContent = r.label;
      btn.onclick = () => {
        inputEl.value = r.text;
        sendMessage();
      };
      qr.appendChild(btn);
    });

    bubble.appendChild(qr);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
  return contentDiv;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🧭';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  isStreaming = true;
  sendBtn.disabled = true;

  addMessage('user', text);

  conversationHistory.push({ role: 'user', content: text });

  const typingEl = addTypingIndicator();

  try {
    const response = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    typingEl.remove();

    const div = document.createElement('div');
    div.className = 'message ai';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🧭';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const contentDiv = document.createElement('div');
    bubble.appendChild(contentDiv);
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);

    let fullText = '';
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) {
              fullText += data.text;
              // Detect and update progress bar
              const qNum = extractQuestionNumber(fullText);
              if (qNum) updateProgress(qNum);
              // Display text without the marker
              const displayText = stripQuestionMarker(fullText);
              contentDiv.innerHTML = '<p>' + parseMarkdown(displayText) + '</p>';
              scrollToBottom();
            }
          } catch {}
        }
      }
    }

    // Check if test is complete (question 40 was answered)
    if (currentQuestion >= 40 && conversationHistory.filter(m => m.role === 'user').length > 40) {
      markTestComplete();
    }

    const displayFull = stripQuestionMarker(fullText);
    conversationHistory.push({ role: 'assistant', content: fullText });

  } catch (err) {
    typingEl.remove();
    addMessage('ai', 'Hubo un error de conexión. Por favor intenta de nuevo.');
  }

  isStreaming = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// Progress tracking
let currentQuestion = 0;

function updateProgress(questionNum) {
  if (questionNum < 1) return;
  currentQuestion = questionNum;
  const pct = Math.round((questionNum - 1) / 40 * 100);
  document.getElementById('progress-bar-container').style.display = 'block';
  document.getElementById('progress-text').textContent = `Pregunta ${questionNum} de 40`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function markTestComplete() {
  document.getElementById('progress-text').textContent = '✅ Test completado';
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('progress-fill').style.width = '100%';
}

// Detect question number in AI response and strip the marker
function extractQuestionNumber(text) {
  const match = text.match(/\[PREGUNTA\s+(\d+)\/40\]/i);
  return match ? parseInt(match[1]) : null;
}

function stripQuestionMarker(text) {
  return text.replace(/\[PREGUNTA\s+\d+\/40\]\s*/gi, '').trim();
}

// Initial greeting — fixed text, no API call
function initGreeting() {
  const welcomeText = `¡Hola! Bienvenido/a al **Test de Arquetipos de Supervivencia Financiera**.

Este test tiene **40 preguntas** y tarda entre 10 y 15 minutos.

Al final vas a descubrir tu arquetipo financiero dominante — el patrón emocional que más influye en cómo te relacionas con el dinero — y recibirás recomendaciones y ejercicios específicos para empezar a cambiar.

No hay respuestas correctas ni incorrectas. Solo responde con honestidad.

Para comenzar: **¿Cómo te llamas?**`;

  const div = document.createElement('div');
  div.className = 'message ai';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🧭';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const contentDiv = document.createElement('div');
  contentDiv.innerHTML = '<p>' + parseMarkdown(welcomeText) + '</p>';
  bubble.appendChild(contentDiv);

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  scrollToBottom();

  conversationHistory.push({
    role: 'assistant',
    content: welcomeText
  });
}

initGreeting();
</script>
</body>
</html>
